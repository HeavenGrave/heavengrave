<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梦想从这里开始</title>
  <!--字体引入-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <!-- My CSS-->
  <link href="static/css/common.css" rel="stylesheet">
  <link href="static/css/login/login.css" rel="stylesheet">
  <!-- Common JS-->
  <script type="text/javascript" src="static/common/jquery/jquery.min.js"></script>
  <script type="text/javascript" src="static/js/axios/axios.js"></script>
</head>
<body>
  <!-- 全屏背景层 -->
  <canvas id="particle-canvas"></canvas>
  <div id="grid-overlay"></div>
  <!-- 鼠标跟随光晕 -->
  <div id="glow-follow"></div>

  <!-- 玻璃表单卡片 -->
  <div class="card" id="form-card">
    <div class="card-inner" id="card-inner">

      <!-- 登录面板 -->
      <div class="panel" id="login-panel">
        <div class="logo">DREAM<span>WORLD</span></div>
        <h1>欢迎回来</h1>
        <p class="subtitle">登录你的账号继续探索</p>
        <form id="login-form" novalidate>
          <div class="input-group">
            <label for="login-username">用户名</label>
            <input type="text" id="login-username" placeholder="用户名" autocomplete="username" >
            <span class="error-msg" id="login-username-error"></span>
          </div>
          <div class="input-group">
            <label for="login-password">密码</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="toggle-visibility" aria-label="切换密码可见性">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="error-msg" id="login-password-error"></span>
          </div>
          <!--<div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="remember-me">
              <span class="checkmark"></span>
              记住我
            </label>
            <a href="#" class="forgot-link">忘记密码？</a>
          </div>-->
          <button type="submit" class="btn-primary">
            <span>登录</span>
            <div class="btn-glow"></div>
          </button>
        </form>
        <p class="switch-text">还没有账号？<a href="#" id="to-register">立即注册</a></p>
      </div>

      <!-- 注册面板 -->
      <div class="panel hidden" id="register-panel">
        <div class="logo">DREAM<span>WORLD</span></div>
        <h1>创建账号</h1>
        <p class="subtitle">加入我们，开启探索之旅</p>
        <form id="register-form" novalidate>
          <div class="input-group">
            <label for="reg-username">用户名</label>
            <input type="text" id="reg-username" placeholder="用户名" autocomplete="username">
            <span class="error-msg" id="reg-username-error"></span>
          </div>

          <div class="input-group">
            <label for="reg-password">密码</label>
            <div class="password-wrapper">
              <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="toggle-visibility" aria-label="切换密码可见性">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="strength-meter" id="strength-meter">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
            <span class="error-msg" id="reg-password-error"></span>
          </div>
          <div class="input-group">
            <label for="reg-confirm">确认密码</label>
            <div class="password-wrapper">
              <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="toggle-visibility" aria-label="切换密码可见性">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="error-msg" id="reg-confirm-error"></span>
          </div>
          <button type="submit" class="btn-primary">
            <span>注册</span>
            <div class="btn-glow"></div>
          </button>
        </form>
        <p class="switch-text">已有账号？<a href="#" id="to-login">立即登录</a></p>
      </div>
    </div>
  </div>
  <!-- My JS-->
  <script type="text/javascript" src="static/js/common.js"></script>
  <script type="text/javascript" src="static/js/login/login.js"></script>
</body>
</html>
